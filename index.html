<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="main.js"></script>
</head>

<body>
  <div class="logo">
    <h1>BATTLESHIP</h1>
  </div>
  <div class="score">
    <h3 class="label">health</h3>
    <div class="container">
      <div class="opponent text">17</div>
      <div class="separator"></div>
      <div class="player text">17</div>
    </div>
  </div>
  <div class="gameboard-container">
    <div class="opponent container">
      <h3 class="opponent label">Opponent's board</h3>
      <div class="opponent grid"></div>
    </div>
    <div class="player container">
      <h3 class="player label">Your board</h3>
      <div class="player grid"></div>
    </div>
  </div>
  <div class="active display">
    <div class="text">
      <h2>Player 1</h2>
      <p>It is your turn.</p>
    </div>
  </div>
</body>

</html>

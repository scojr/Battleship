<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="main.js"></script>
</head>

<body>
  <div class="gameboard-container">
    <div class="player container">
      <h3 class="player label">Your board</h3>
      <div class="player grid"></div>
    </div>
    <div class="opponent container">
      <h3 class="opponent label">Opponent's board</h3>
      <div class="opponent grid inactive"></div>
    </div>
  </div>
  <div class="active display shadow">
    <div class="text">
      <h2 class="header">New Game</h2>
      <p>Place your ships on the board below. Click 'Play' to begin.</p>
    </div>
  </div>
  <div class="button-container">
    <button class="ready shadow">Play</button>
  </div>
</body>

</html>
